<body>

<h1>JavaScript Queue</h1>

<div class="visualizer">
    <div class="vis-title">Java Script Queue</div>

    <!-- Dequeue zone: top-left -->
    <div class="dequeue-area">
        <div class="dequeue-block" id="dequeueBlock"></div>
    </div>
    <span class="side-label label-dequeue">◄ DEQUEUE</span>

    <!-- Queue row -->
    <div class="queue-row-wrapper">
        <div class="queue-row" id="queueRow"></div>
    </div>

    <!-- Enqueue zone: bottom-right -->
    <div class="enqueue-area">
        <div class="enqueue-block" id="enqueueBlock"></div>
    </div>
    <span class="side-label label-enqueue">ENQUEUE ►</span>

    <!-- Info -->
    <div class="info-bar">
        <span>SIZE: <span id="sizeDisplay">0</span></span>
        <span>FRONT: <span id="frontDisplay">—</span></span>
        <span>REAR: <span id="rearDisplay">—</span></span>
        <span>OPS: <span id="opsDisplay">0</span></span>
    </div>
</div>

<div class="btn-row">
    <button id="startBtn">▶ START</button>
    <button id="stopBtn" disabled>■ STOP</button>
</div>

</script>
</body>
